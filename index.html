<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Which Beatle Are You?</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="main.css"/>
</head>
<body>

  <!-- INTRO SCREEN -->
  <div id="screen-intro" class="screen active">
    <div class="hero-image-overlay"></div>
    <div class="vinyl-bg"></div>
    <div class="intro-content">
      <p class="eyebrow">A personality quiz</p>
      <h1 class="title">Which Beatle<br/><em>are you?</em></h1>
      <p class="subtitle">10 questions about how you live, decide, and think.<br/>Your inner Beatle awaits.</p>
      <button class="btn-start" onclick="startQuiz()">Let's find out</button>
    </div>
    <div class="beatles-strip">
      <div class="beatle-chip">John</div>
      <div class="beatle-chip">Paul</div>
      <div class="beatle-chip">George</div>
      <div class="beatle-chip">Ringo</div>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-bg-a quiz-bg" id="quiz-bg-a"></div>
    <div class="quiz-bg-b quiz-bg" id="quiz-bg-b"></div>
    <div class="quiz-bg-overlay" id="quiz-bg-overlay"></div>
    <div class="quiz-wrap">
      <div class="progress-bar-wrap">
        <div class="progress-track">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
        <span class="progress-label" id="progress-label">1 / 10</span>
      </div>

      <div class="question-card" id="question-card">
        <p class="q-number" id="q-number">Q1</p>
        <h2 class="q-text" id="q-text"></h2>
        <div class="options-grid" id="options-grid"></div>
      </div>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="screen-result" class="screen">
    <div class="result-wrap">

      <!-- Beatle Portrait -->
      <div class="beatle-portrait-wrap" id="beatle-portrait-wrap">
        <div class="beatle-portrait-frame" id="beatle-portrait-frame">
          <img class="beatle-portrait-img" id="beatle-portrait-img" src="" alt="" />
          <div class="portrait-noise"></div>
        </div>
        <div class="portrait-label" id="portrait-label"></div>
      </div>

      <p class="eyebrow">You are...</p>
      <h1 class="result-name" id="result-name"></h1>
      <p class="result-desc" id="result-desc"></p>

      <div class="secondary-badge" id="secondary-badge"></div>

      <div class="breakdown-section">
        <p class="breakdown-title">Your full breakdown</p>
        <div id="breakdown-bars"></div>
      </div>

      <button class="btn-start" onclick="startQuiz()">Take it again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
